<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧护理管理端</title>
    <style>
      body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:#f5f7ff;color:#1d2746}
      .wrap{max-width:1100px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #e8ecf7;border-radius:14px;padding:14px;margin-bottom:12px}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:8px} .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
      input,button,select{padding:10px;border:1px solid #dbe4ff;border-radius:10px;width:100%;box-sizing:border-box}
      button{background:#3d6bff;color:#fff;border:none;cursor:pointer} button.secondary{background:#eef2ff;color:#3556d9;border:1px solid #dbe4ff}
      .btns{display:flex;gap:8px}.muted{font-size:12px;color:#6d7792}.item{border:1px solid #e8ecf7;border-radius:10px;padding:10px;margin-top:8px}
      .hidden{display:none}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>护士/管理员端</h2>
        <p class="muted">按钮会根据权限自动显示/隐藏（细粒度权限点）</p>
        <div class="row">
          <input id="account" placeholder="账号" />
          <input id="password" type="password" placeholder="密码" />
        </div>
        <div class="btns" style="margin-top:8px;">
          <button onclick="loginAdmin()">登录</button>
          <button class="secondary" onclick="fillAdmin()">填充admin示例</button>
          <button class="secondary" onclick="fillNurse()">填充nurse示例</button>
        </div>
        <p id="who" class="muted">未登录</p>
      </div>

      <div class="card">
        <h3>订单池</h3>
        <button onclick="loadAdminOrders()">刷新订单</button>
        <div id="orders"></div>
      </div>

      <div class="card" id="assignCard">
        <h3>分配护士（admin）</h3>
        <div class="row3">
          <input id="assignOrderId" placeholder="订单ID" />
          <input id="assignNurseId" placeholder="护士ID" />
          <button onclick="assignNurse()">分配</button>
        </div>
      </div>

      <div class="card" id="statusCard">
        <h3>订单状态流转（admin/nurse）</h3>
        <div class="row3">
          <input id="statusOrderId" placeholder="订单ID" />
          <select id="nextStatus">
            <option value="accepted">accepted</option>
            <option value="in_service">in_service</option>
            <option value="completed">completed</option>
          </select>
          <button onclick="updateStatus()">更新状态</button>
        </div>
      </div>

      <div class="card" id="serviceCard">
        <h3>服务项目管理（admin）</h3>
        <div class="row3">
          <input id="svcName" placeholder="服务名" />
          <input id="svcPrice" placeholder="价格" />
          <input id="svcDuration" placeholder="时长(分钟)" />
        </div>
        <input id="svcDesc" placeholder="描述" style="margin-top:8px;" />
        <div class="btns" style="margin-top:8px;">
          <button onclick="createService()">新增服务</button>
          <button class="secondary" onclick="updateService()">更新服务</button>
          <button class="secondary" onclick="deleteService()">删除服务</button>
        </div>
        <div class="row" style="margin-top:8px;"><input id="svcId" placeholder="服务ID（更新/删除用）" /><input id="sigTs" placeholder="签名时间戳(自动)" /></div>
      </div>
    </div>
    <script src="./js/admin.js"></script>
  </body>
</html>
