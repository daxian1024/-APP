version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: smart_nursing_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: smart_nursing
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: smart_nursing_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: python:3.11-slim
    container_name: smart_nursing_backend
    restart: always
    working_dir: /app
    volumes:
      - ../backend:/app
      - ../requirements.txt:/requirements.txt
    command: sh -c "pip install -r /requirements.txt && python run.py"
    environment:
      DATABASE_URL: mysql+pymysql://root:123456@mysql:3306/smart_nursing?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key
      JWT_SECRET_KEY: your-jwt-secret
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:latest
    container_name: smart_nursing_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
